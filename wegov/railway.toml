[build]
dockerfile = "Dockerfile"

[deploy]
startCommand = "python -c 'from app.main import app; print(\"Import OK\")' && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
